<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Bot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>🤖 Smart AI Bot</h1>
            <p>المستشار الذكي متعدد التخصصات</p>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="message bot-message">
                <div class="message-content">
                    🎉 أهلاً بك! أنا مستشار الذكاء الاصطناعي الخارق.
                    <br><br>
                    أرسل سؤالك، صورتك، أو ملفك وسأجيبك فوراً.
                </div>
            </div>
        </div>

        <!-- الشبكة الرئيسية للأزرار -->
        <div class="features-grid">
            <button class="feature-btn" onclick="sendTextPrompt()">
                <span class="icon">💬</span>
                <span>محادثة</span>
            </button>
            <button class="feature-btn" onclick="triggerImageUpload()">
                <span class="icon">🖼️</span>
                <span>تحليل صورة</span>
            </button>
            <button class="feature-btn" onclick="triggerDocUpload()">
                <span class="icon">📄</span>
                <span>رفع ملف</span>
            </button>
            <button class="feature-btn" onclick="openBot()">
                <span class="icon">🤖</span>
                <span>فتح البوت</span>
            </button>
            <!-- زر التقاط صورة يفتح الكاميرا مباشرة مع بث حي -->
            <button class="feature-btn" onclick="startCamera('photo')">
                <span class="icon">📸</span>
                <span>التقاط صورة</span>
            </button>
            <!-- زر ترجمة حية يفتح الكاميرا ثم يترجم بعد الالتقاط -->
            <button class="feature-btn" onclick="startCamera('translate')">
                <span class="icon">🌐</span>
                <span>ترجمة حية</span>
            </button>
        </div>

        <!-- منطقة عرض بث الكاميرا والتقاط الصورة -->
        <div id="cameraContainer" style="display: none; text-align: center; margin: 10px 0;">
            <video id="cameraStream" autoplay playsinline style="width: 100%; max-width: 350px; border-radius: 15px;"></video>
            <br>
            <button class="send-btn" onclick="captureFromCamera()" style="margin-top: 10px;">📷 التقط الصورة</button>
            <button class="feature-btn" onclick="stopCamera()" style="margin-top: 5px; display: block; width: 100%;">إلغاء</button>
        </div>

        <!-- مربع الإدخال والإرسال -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك أو تعليقك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>

        <footer class="app-footer">
            <p>👨‍💻 المبرمج: Omar Abd El Gawaad</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
