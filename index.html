<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Bot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- ... (هيكل الـ body كما هو بدون تغيير) ... -->
        <div class="features-grid">
            <button class="feature-btn" onclick="sendTextPrompt()">
                <span class="icon">💬</span><span>محادثة</span>
            </button>
            <button class="feature-btn" onclick="triggerImageUpload()">
                <span class="icon">🖼️</span><span>تحليل صورة</span>
            </button>
            <button class="feature-btn" onclick="triggerDocUpload()">
                <span class="icon">📄</span><span>رفع ملف</span>
            </button>
            <button class="feature-btn" onclick="openBot()">
                <span class="icon">🤖</span><span>فتح البوت</span>
            </button>
            <!-- هذا الزر سيفتح الكاميرا أو المعرض -->
            <button class="feature-btn" onclick="captureAndProcess('photo')">
                <span class="icon">📸</span><span>التقاط صورة</span>
            </button>
            <!-- وهذا الزر لترجمة الصورة بعد التقاطها -->
            <button class="feature-btn" onclick="captureAndProcess('translate')">
                <span class="icon">🌐</span><span>ترجمة صورة</span>
            </button>
        </div>
        <!-- ... (باقي الهيكل كما هو) ... -->
    </div>
    <script src="script.js"></script>
</body>
</html>
